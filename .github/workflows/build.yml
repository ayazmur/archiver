name: Build Multi-Platform

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:

  build:
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install deps
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      # ---------- BUILD с оптимизацией ----------
      - name: Build app (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          pyinstaller --onefile --windowed --name ModernArchiver `
            --exclude-module PyQt6.QAxContainer `
            --exclude-module PyQt6.QtBluetooth `
            --exclude-module PyQt6.QtDBus `
            --exclude-module PyQt6.QtDesigner `
            --exclude-module PyQt6.QtHelp `
            --exclude-module PyQt6.QtMultimedia `
            --exclude-module PyQt6.QtMultimediaWidgets `
            --exclude-module PyQt6.QtNfc `
            --exclude-module PyQt6.QtOpenGL `
            --exclude-module PyQt6.QtOpenGLWidgets `
            --exclude-module PyQt6.QtPdf `
            --exclude-module PyQt6.QtPdfWidgets `
            --exclude-module PyQt6.QtPositioning `
            --exclude-module PyQt6.QtPrintSupport `
            --exclude-module PyQt6.QtQml `
            --exclude-module PyQt6.QtQuick `
            --exclude-module PyQt6.QtQuick3D `
            --exclude-module PyQt6.QtQuickWidgets `
            --exclude-module PyQt6.QtRemoteObjects `
            --exclude-module PyQt6.QtSensors `
            --exclude-module PyQt6.QtSerialPort `
            --exclude-module PyQt6.QtSpatialAudio `
            --exclude-module PyQt6.QtSql `
            --exclude-module PyQt6.QtStateMachine `
            --exclude-module PyQt6.QtSvg `
            --exclude-module PyQt6.QtSvgWidgets `
            --exclude-module PyQt6.QtTest `
            --exclude-module PyQt6.QtTextToSpeech `
            --exclude-module PyQt6.QtWebChannel `
            --exclude-module PyQt6.QtWebSockets `
            --exclude-module PyQt6.QtXml `
            app.py

      - name: Build app (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          pyinstaller --onefile --windowed --name ModernArchiver \
            --exclude-module PyQt6.QAxContainer \
            --exclude-module PyQt6.QtBluetooth \
            --exclude-module PyQt6.QtDBus \
            --exclude-module PyQt6.QtDesigner \
            --exclude-module PyQt6.QtHelp \
            --exclude-module PyQt6.QtMultimedia \
            --exclude-module PyQt6.QtMultimediaWidgets \
            --exclude-module PyQt6.QtNfc \
            --exclude-module PyQt6.QtOpenGL \
            --exclude-module PyQt6.QtOpenGLWidgets \
            --exclude-module PyQt6.QtPdf \
            --exclude-module PyQt6.QtPdfWidgets \
            --exclude-module PyQt6.QtPositioning \
            --exclude-module PyQt6.QtPrintSupport \
            --exclude-module PyQt6.QtQml \
            --exclude-module PyQt6.QtQuick \
            --exclude-module PyQt6.QtQuick3D \
            --exclude-module PyQt6.QtQuickWidgets \
            --exclude-module PyQt6.QtRemoteObjects \
            --exclude-module PyQt6.QtSensors \
            --exclude-module PyQt6.QtSerialPort \
            --exclude-module PyQt6.QtSpatialAudio \
            --exclude-module PyQt6.QtSql \
            --exclude-module PyQt6.QtStateMachine \
            --exclude-module PyQt6.QtSvg \
            --exclude-module PyQt6.QtSvgWidgets \
            --exclude-module PyQt6.QtTest \
            --exclude-module PyQt6.QtTextToSpeech \
            --exclude-module PyQt6.QtWebChannel \
            --exclude-module PyQt6.QtWebSockets \
            --exclude-module PyQt6.QtXml \
            app.py

      - name: Build app (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          pyinstaller --onefile --windowed --name ModernArchiver \
            --exclude-module PyQt6.QAxContainer \
            --exclude-module PyQt6.QtBluetooth \
            --exclude-module PyQt6.QtDBus \
            --exclude-module PyQt6.QtDesigner \
            --exclude-module PyQt6.QtHelp \
            --exclude-module PyQt6.QtMultimedia \
            --exclude-module PyQt6.QtMultimediaWidgets \
            --exclude-module PyQt6.QtNfc \
            --exclude-module PyQt6.QtOpenGL \
            --exclude-module PyQt6.QtOpenGLWidgets \
            --exclude-module PyQt6.QtPdf \
            --exclude-module PyQt6.QtPdfWidgets \
            --exclude-module PyQt6.QtPositioning \
            --exclude-module PyQt6.QtPrintSupport \
            --exclude-module PyQt6.QtQml \
            --exclude-module PyQt6.QtQuick \
            --exclude-module PyQt6.QtQuick3D \
            --exclude-module PyQt6.QtQuickWidgets \
            --exclude-module PyQt6.QtRemoteObjects \
            --exclude-module PyQt6.QtSensors \
            --exclude-module PyQt6.QtSerialPort \
            --exclude-module PyQt6.QtSpatialAudio \
            --exclude-module PyQt6.QtSql \
            --exclude-module PyQt6.QtStateMachine \
            --exclude-module PyQt6.QtSvg \
            --exclude-module PyQt6.QtSvgWidgets \
            --exclude-module PyQt6.QtTest \
            --exclude-module PyQt6.QtTextToSpeech \
            --exclude-module PyQt6.QtWebChannel \
            --exclude-module PyQt6.QtWebSockets \
            --exclude-module PyQt6.QtXml \
            app.py

      - name: List dist directory
        run: ls -la dist/

      # ---------- WINDOWS INSTALLER ----------
      - name: Install Inno Setup
        if: matrix.os == 'windows-latest'
        run: choco install innosetup -y

      - name: Create Inno Setup script
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          @"
          [Setup]
          AppName=Modern Archiver
          AppVersion=1.0.0
          DefaultDirName={pf}\Modern Archiver
          DefaultGroupName=Modern Archiver
          UninstallDisplayIcon={app}\ModernArchiver.exe
          Compression=lzma2
          SolidCompression=yes
          OutputDir=Output
          OutputBaseFilename=ModernArchiver_Setup
          
          [Files]
          Source: "dist\ModernArchiver.exe"; DestDir: "{app}"
          
          [Icons]
          Name: "{group}\Modern Archiver"; Filename: "{app}\ModernArchiver.exe"
          Name: "{group}\Uninstall Modern Archiver"; Filename: "{uninstallexe}"
          "@ | Out-File -FilePath installer.iss -Encoding UTF8

      - name: Build Windows Installer
        if: matrix.os == 'windows-latest'
        run: iscc installer.iss

      # ---------- LINUX APPIMAGE ----------
      - name: Build AppImage
        if: matrix.os == 'ubuntu-latest'
        run: |
          mkdir -p AppDir/usr/bin
          cp dist/ModernArchiver AppDir/usr/bin/
          
          cat > AppDir/modern-archiver.desktop << EOF
          [Desktop Entry]
          Name=Modern Archiver
          Exec=ModernArchiver
          Icon=archive
          Type=Application
          Categories=Utility;
          EOF
          
          wget -q "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage" -O appimagetool
          chmod +x appimagetool
          ARCH=x86_64 ./appimagetool AppDir ModernArchiver.AppImage

      # ---------- MACOS DMG ----------
      - name: Create DMG on macOS
        if: matrix.os == 'macos-latest'
        run: |
          mkdir -p dmg_folder
          cp dist/ModernArchiver dmg_folder/
          hdiutil create -volname "Modern Archiver" -srcfolder dmg_folder -ov -format UDZO ModernArchiver.dmg

      # ---------- UPLOAD ARTIFACTS ----------
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.os }}
          path: |
            dist/ModernArchiver*
            *.AppImage
            *.dmg
            Output/*.exe
          if-no-files-found: warn

  # Отдельная джоба для создания релиза
  create-release:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: Build ${{ github.run_number }}
          prerelease: true
          files: |
            artifacts/**/*.exe
            artifacts/**/*.AppImage
            artifacts/**/*.dmg
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}