# .github/workflows/release.yml

name: Build and Release EXE

# Запускать воркфлоу только при создании нового релиза на GitHub
on:
  release:
    types: [created]

jobs:
  build-windows:
    runs-on: windows-latest # Собирать будем на Windows

    steps:
      # 1. Клонируем репозиторий
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Устанавливаем Python
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10' # Можно выбрать конкретную версию

      # 3. Устанавливаем PyInstaller
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller

      # 4. Собираем EXE-файл
      # Используем флаги --onefile и --name для красивого результата
      - name: Build executable with PyInstaller
        run: pyinstaller --onefile --name "archiver" archiver.py

      # 5. Загружаем EXE как артефакт релиза
      # Это самый важный шаг. Он берет созданный .exe и прикрепляет его к странице релиза
      - name: Upload EXE to Release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: dist/archiver.exe
          asset_name: archiver-windows-x64.exe # Имя файла, которое увидят пользователи
          tag: ${{ github.ref }}
          overwrite: true
