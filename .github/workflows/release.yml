# .github/workflows/release.yml

name: Build and Release EXE

on:
  release:
    types: [created]

jobs:
  build-windows:
    runs-on: windows-latest

    # --- ВОТ ИЗМЕНЕНИЕ ---
    # Явно предоставляем права на запись в 'contents' (релизы, код и т.д.)
    # Это необходимо для шага "Upload EXE to Release"
    permissions:
      contents: write
    # ---------------------

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller

      - name: Build executable with PyInstaller
        run: pyinstaller --onefile --name "gui_archiver" gui_archiver.py

      - name: Upload EXE to Release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: dist/gui_archiver.exe
          asset_name: gui_archiver-windows-x64.exe
          tag: ${{ github.ref }}
          overwrite: true