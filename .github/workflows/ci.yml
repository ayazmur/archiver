# .github/workflows/ci.yml

name: Python CI

# Запускать этот воркфлоу при push или pull request в ветку main
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    # Запускать на последней версии Ubuntu
    runs-on: ubuntu-latest

    # Запускать шаги для разных версий Python
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11"]

    steps:
    # 1. Клонируем репозиторий
    - uses: actions/checkout@v4

    # 2. Устанавливаем нужную версию Python
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    # 3. Устанавливаем зависимости (в нашем случае - линтер)
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8

    # 4. Запускаем линтер (проверка стиля и ошибок)
    # flake8 остановит сборку, если найдет ошибки.
    # --count --select=E9,F63,F7,F82 --show-source --statistics: базовые проверки на синтаксические ошибки
    # --max-line-length=120: немного увеличим лимит длины строки
    - name: Lint with flake8
      run: |
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=120 --statistics

    # 5. Простой "дымовой тест" - проверяем, что скрипт запускается и показывает справку
    - name: Run smoke test
      run: python archiver.py --help