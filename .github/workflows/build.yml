name: Build Multi-Platform

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:

  build:
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install deps
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      # ---------- BUILD ----------
      - name: Build app
        run: |
          pyinstaller --onefile --windowed --name ModernArchiver --collect-all PyQt6 app.py

      # ---------- WINDOWS INSTALLER ----------
      - name: Install Inno Setup
        if: matrix.os == 'windows-latest'
        run: choco install innosetup -y

      - name: Build Installer
        if: matrix.os == 'windows-latest'
        run: iscc installer.iss

      # ---------- LINUX APPIMAGE ----------
      - name: Build AppImage
        if: matrix.os == 'ubuntu-latest'
        run: |
          mkdir AppDir
          cp dist/ModernArchiver AppDir/
          wget -q https://github.com/AppImage/AppImageKit/releases/latest/download/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage
          ./appimagetool-x86_64.AppImage AppDir ModernArchiver.AppImage

      # ---------- MACOS DMG ----------
      - name: Build DMG
        if: matrix.os == 'macos-latest'
        run: |
          hdiutil create ModernArchiver.dmg -srcfolder dist/

      # ---------- VERSION ----------
      - name: Set version
        run: echo "VERSION=build-${{ github.run_number }}" >> $GITHUB_ENV

      # ---------- RELEASE ----------
      - name: Upload Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: Build ${{ env.VERSION }}
          prerelease: true
          files: |
            dist/ModernArchiver*
            ModernArchiver*.AppImage
            ModernArchiver.dmg
            Output/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}