name: Build Multi-Platform

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:

  build:
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install deps
        run: |
          pip install PyQt6 requests
          pip install pyinstaller

      # ---------- BUILD ----------
      - name: Build app
        run: |
          pyinstaller --onefile --windowed --name ModernArchiver app.py

      # ---------- LIST FILES (кросс-платформенно) ----------
      - name: List dist directory (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          dir dist
          echo "Current directory:"
          dir

      - name: List dist directory (Linux/macOS)
        if: matrix.os != 'windows-latest'
        run: |
          ls -la dist/ || echo "dist directory not found"
          ls -la || echo "current directory"

      # ---------- WINDOWS INSTALLER ----------
      - name: Install Inno Setup
        if: matrix.os == 'windows-latest'
        run: choco install innosetup -y

      - name: Create Inno Setup script
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          @"
          [Setup]
          AppName=Modern Archiver
          AppVersion=1.0.0
          DefaultDirName={pf}\Modern Archiver
          DefaultGroupName=Modern Archiver
          UninstallDisplayIcon={app}\ModernArchiver.exe
          Compression=lzma2
          SolidCompression=yes
          OutputDir=Output
          OutputBaseFilename=ModernArchiver_Setup
          
          [Files]
          Source: "dist\ModernArchiver.exe"; DestDir: "{app}"
          
          [Icons]
          Name: "{group}\Modern Archiver"; Filename: "{app}\ModernArchiver.exe"
          Name: "{group}\Uninstall Modern Archiver"; Filename: "{uninstallexe}"
          "@ | Out-File -FilePath installer.iss -Encoding UTF8

      - name: Build Windows Installer
        if: matrix.os == 'windows-latest'
        run: iscc installer.iss

      # ---------- LINUX APPIMAGE ----------
      - name: Build AppImage
        if: matrix.os == 'ubuntu-latest'
        run: |
          mkdir -p AppDir/usr/bin
          cp dist/ModernArchiver AppDir/usr/bin/
          
          cat > AppDir/modern-archiver.desktop << EOF
          [Desktop Entry]
          Name=Modern Archiver
          Exec=ModernArchiver
          Icon=archive
          Type=Application
          Categories=Utility;
          EOF
          
          wget -q "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage" -O appimagetool
          chmod +x appimagetool
          ARCH=x86_64 ./appimagetool AppDir ModernArchiver.AppImage || echo "AppImage creation failed"

      # ---------- MACOS DMG ----------
      - name: Create DMG on macOS
        if: matrix.os == 'macos-latest'
        run: |
          mkdir -p dmg_folder
          cp dist/ModernArchiver dmg_folder/
          hdiutil create -volname "Modern Archiver" -srcfolder dmg_folder -ov -format UDZO ModernArchiver.dmg || echo "DMG creation failed"

      # ---------- UPLOAD ARTIFACTS ----------
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.os }}
          path: |
            dist/ModernArchiver*
            *.AppImage
            *.dmg
            Output/*.exe
          if-no-files-found: warn

  # Отдельная джоба для создания релиза
  create-release:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: Build ${{ github.run_number }}
          prerelease: true
          files: |
            artifacts/**/ModernArchiver.exe
            artifacts/**/*.AppImage
            artifacts/**/*.dmg
            artifacts/**/*.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}