# .github/workflows/build-and-release.yml

name: Build and Release

on:
  push:
    branches:
      - main
    # Запускать воркфлоу также при пуше новых тегов, которые начинаются на 'v'
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build executable with PyInstaller
        run: pyinstaller --onefile --windowed --name "ModernArchiver" modern_archiver.py

      # --- Шаг 1: Загрузка артефакта для обычных push и PR ---
      # Этот шаг выполняется всегда, кроме пуша тегов
      - name: Upload Build Artifact
        if: "!startsWith(github.ref, 'refs/tags/')"
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: dist/ModernArchiver.exe

      # --- Шаг 2: Создание релиза и загрузка EXE при пуше тега ---
      # Этот шаг выполняется ТОЛЬКО при пуше тега (например, v1.1)
      - name: Create Release and Upload Asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          # `GITHUB_TOKEN` уже имеет нужные права, если воркфлоу запускается по тегу
          token: ${{ secrets.GITHUB_TOKEN }}
          # `draft: false` - сразу публикует релиз.
          # `draft: true` - создает черновик, который нужно опубликовать вручную.
          draft: false
          # `prerelease: false` - отмечает релиз как стабильный.
          # `prerelease: true` - отмечает как пре-релиз.
          prerelease: false
          # Имя релиза будет таким же, как и тег
          name: Release ${{ github.ref_name }}
          # Тело релиза (описание). 'generate_release_notes' автоматически создаст список изменений.
          generate_release_notes: true
          # Файлы, которые нужно прикрепить к релизу
          files: |
            dist/ModernArchiver.exe