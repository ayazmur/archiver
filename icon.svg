<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4A90E2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#357ABD;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#50E3C2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2ECC71;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Задний фон с закругленными углами -->
  <rect x="16" y="16" width="224" height="224" rx="48" ry="48" fill="url(#grad1)"/>
  
  <!-- Внутренний прямоугольник -->
  <rect x="48" y="48" width="160" height="160" rx="16" ry="16" fill="#FFFFFF" opacity="0.15"/>
  
  <!-- Линии для изображения архива -->
  <!-- Верхняя линия -->
  <rect x="64" y="80" width="128" height="8" rx="4" fill="#FFFFFF" opacity="0.9"/>
  
  <!-- Вторая линия -->
  <rect x="64" y="104" width="128" height="8" rx="4" fill="#FFFFFF" opacity="0.9"/>
  
  <!-- Третья линия -->
  <rect x="64" y="128" width="128" height="8" rx="4" fill="#FFFFFF" opacity="0.9"/>
  
  <!-- Четвертая линия (короче) -->
  <rect x="64" y="152" width="96" height="8" rx="4" fill="#FFFFFF" opacity="0.9"/>
  
  <!-- Замок (символ пароля) -->
  <!-- Дужка замка -->
  <path d="M 112 104 L 112 96 C 112 88 120 80 128 80 C 136 80 144 88 144 96 L 144 104" 
        fill="none" stroke="url(#grad2)" stroke-width="8" stroke-linecap="round"/>
  
  <!-- Корпус замка -->
  <rect x="104" y="104" width="48" height="40" rx="8" fill="url(#grad2)"/>
  
  <!-- Замочная скважина -->
  <circle cx="128" cy="124" r="6" fill="#FFFFFF" opacity="0.9"/>
  <rect x="126" y="124" width="4" height="12" rx="2" fill="#FFFFFF" opacity="0.9"/>
  
  <!-- Скоба молнии -->
  <path d="M 160 176 L 144 176 L 148 164 L 132 164 L 156 144 L 148 158 L 164 158 Z" 
        fill="#FFD700" opacity="0.9"/>
</svg>
